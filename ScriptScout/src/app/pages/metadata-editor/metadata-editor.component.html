<div class="metadata-page">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="logo">
      <img src="assets/logo.png" alt="logo">
      <h2>ScriptScout</h2>
    </div>

    <ul class="menu">
      <li><i class="fas fa-home"></i> Dashboard</li>
      <li><i class="fas fa-folder"></i> Media Library</li>
      <li><i class="fas fa-upload"></i> Upload Video</li>
      <li><i class="fas fa-spinner"></i> Processing Queue</li>
      <li class="active">
        <i class="fas fa-edit"></i>
        Metadata Editor
      </li>
      <li><i class="fas fa-file-alt"></i> Transcript</li>
      <li><i class="fas fa-list"></i> Chapters</li>
      <li><i class="fas fa-search"></i> Search & Catalog</li>
      <li><i class="fas fa-tags"></i> Tags & Keywords</li>
      <li><i class="fas fa-chart-line"></i> Reports</li>
    </ul>

    <div class="bottom-menu">
      <p><i class="fas fa-cog"></i> Settings</p>
      <p><i class="fas fa-sign-out-alt"></i> Logout</p>
    </div>

  </aside>

  <!-- Main Content -->
  <div class="main">

    <!-- Header -->
    <div class="header">

      <div class="left">

        <a class="back">
          ← Back to Video
        </a>

        <h2>AI Revolution in Healthcare</h2>

      </div>

      <button class="ai-btn">
        ✨ AI Regenerate
      </button>

    </div>

    <!-- Form Card -->

    <div class="card">

      <h3>Metadata Editor</h3>

      <div class="row">

        <div class="form-group">
          <label>Title *</label>

          <input
            type="text"
            [(ngModel)]="metadata.title">
        </div>

        <div class="form-group">
          <label>Category *</label>

          <select [(ngModel)]="metadata.category">

            <option>Technology</option>
            <option>Education</option>
            <option>Health</option>

          </select>
        </div>

      </div>

      <div class="row">

        <div class="form-group">

          <label>Sub Category</label>

          <input
            type="text"
            [(ngModel)]="metadata.subCategory">

        </div>

        <div class="form-group">

          <label>Video Category</label>

          <select [(ngModel)]="metadata.videoCategory">

            <option>English</option>
            <option>Medical</option>
            <option>Science</option>

          </select>

        </div>

      </div>

      <div class="form-group">

        <label>Description</label>

        <textarea
          rows="6"
          [(ngModel)]="metadata.description">

        </textarea>

      </div>

      <div class="row">

        <div class="form-group">

          <label>Language</label>

          <select [(ngModel)]="metadata.language">

            <option>English</option>
            <option>Hindi</option>
            <option>Telugu</option>

          </select>

        </div>

        <div class="form-group">

          <label>Age Rating</label>

          <select [(ngModel)]="metadata.rating">

            <option>PG</option>
            <option>U</option>
            <option>18+</option>

          </select>

        </div>

      </div>

      <!-- Tags -->

      <div class="form-group">

        <label>Tags / Keywords</label>

        <div class="tags">

          <span *ngFor="let tag of metadata.tags">
            {{tag}}
          </span>

          <button class="add-btn">
            + Add Keyword
          </button>

        </div>

      </div>

      <div class="row">

        <div class="form-group">

          <label>Visibility</label>

          <select [(ngModel)]="metadata.visibility">

            <option>Public</option>
            <option>Private</option>

          </select>

        </div>

      </div>

      <!-- Buttons -->

      <div class="buttons">

        <button class="reset-btn">
          Reset
        </button>

        <button class="save-btn">
          Save Metadata
        </button>

      </div>

    </div>

  </div>

</div>
