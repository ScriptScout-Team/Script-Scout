<div class="video-container">

  <div class="header">
    <h2>Video Library</h2>

    <button (click)="addVideo()">
      + Add Video
    </button>
  </div>

  <div class="search-box">

    <input
      type="text"
      placeholder="Search videos..."
      [(ngModel)]="searchText">

  </div>

  <div class="video-grid">

    <div class="video-card" *ngFor="let video of filteredVideos()">

      <img [src]="video.thumbnail" alt="thumbnail">

      <div class="content">

        <h3>{{video.title}}</h3>

        <p>{{video.category}}</p>

        <span>{{video.duration}}</span>

        <div class="actions">

          <button class="edit" (click)="editVideo(video)">
            Edit
          </button>

          <button class="delete" (click)="deleteVideo(video)">
            Delete
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
